  <rect x="1104" y="172" width="10" height="32" rx="1" fill="#0a0a0a" transform="rotate(15 1109 188)"/>
  <polygon points="1102,206 1112,208 1107,218" fill="#0a0a0a"/>
  <rect x="1104" y="170" width="10" height="8" fill="#0a0a0a" opacity="0.5" transform="rotate(15 1109 174)"/>
  <rect x="1080" y="240" width="64" height="3" fill="#0a0a0a" opacity="0.1"/>
  <rect x="1080" y="250" width="48" height="3" fill="#0a0a0a" opacity="0.06"/>

