  <rect x="712" y="295" width="136" height="12" fill="#29C5F5" opacity="0.6"/>

  <rect x="876" y="284" width="180" height="34" rx="2" stroke="#29C5F5" stroke-width="2" fill="#e8f8fd"/>
  <rect x="888" y="295" width="156" height="12" fill="#29C5F5" opacity="0.55"/>

  <rect x="700" y="336" width="140" height="34" rx="2" stroke="#29C5F5" stroke-width="2" fill="#e8f8fd"/>
