  <rect x="130" y="404" width="410" height="80" stroke="#0a0a0a" stroke-width="1" opacity="0.12" fill="#0a0a0a" fill-opacity="0.03"/>
  <line x1="130" y1="404" x2="540" y2="484" stroke="#0a0a0a" stroke-width="1" opacity="0.08"/>
  <line x1="540" y1="404" x2="130" y2="484" stroke="#0a0a0a" stroke-width="1" opacity="0.08"/>

