  <rect x="876" y="468" width="180" height="26" rx="2" stroke="#0a0a0a" stroke-width="1" opacity="0.1" fill="#f5f5f5"/>
  <rect x="886" y="475" width="160" height="10" fill="#0a0a0a" opacity="0.1"/>

  <rect x="700" y="506" width="120" height="26" rx="2" stroke="#0a0a0a" stroke-width="1" opacity="0.09" fill="#f5f5f5"/>
  <rect x="836" y="506" width="200" height="26" rx="2" stroke="#0a0a0a" stroke-width="1" opacity="0.08" fill="#f5f5f5"/>

