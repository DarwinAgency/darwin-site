  <rect x="916" y="430" width="140" height="26" rx="2" stroke="#0a0a0a" stroke-width="1" opacity="0.14" fill="#f5f5f5"/>
  <rect x="926" y="437" width="120" height="10" fill="#0a0a0a" opacity="0.14"/>

